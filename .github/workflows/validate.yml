name: Validate

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.homeassistant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - homeassistant: minimum
            package: homeassistant==2025.12.0
          - homeassistant: latest
            package: homeassistant
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv
      - name: Ruff
        run: |
          uvx ruff check .
          uvx ruff format --check .
      - name: Pytest
        run: >-
          uv run --no-project --python 3.13
          --with "${{ matrix.package }}"
          --with "pycares<5"
          --with pytest
          --with pytest-asyncio
          pytest -q

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration